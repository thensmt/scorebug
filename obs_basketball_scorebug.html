<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBS Basketball Scorebug</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --scale: 1;
      --safe-bottom: 42px;
      --bug-width: 960px;
      --bug-height: 116px;
      --away: #0b51c5;
      --home: #0e8f47;
      --panel: rgba(5, 7, 10, 0.98);
      --panel-soft: rgba(14, 18, 24, 0.98);
      --line: rgba(255, 255, 255, 0.09);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --gold: #f3c51d;
      --brand: #0e80fc;
      --shadow: 0 18px 32px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: "Barlow Condensed", "Arial Narrow", Arial, sans-serif;
      color: var(--text);
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .scorebug-wrap {
      position: absolute;
      bottom: var(--safe-bottom);
      left: 50%;
      width: var(--bug-width);
      height: var(--bug-height);
      transform: translateX(-50%) scale(var(--scale));
      transform-origin: bottom center;
      filter: drop-shadow(var(--shadow));
    }

    .scorebug {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 184px 238px 128px 238px 184px;
      background: linear-gradient(180deg, rgba(11, 13, 16, 0.99), rgba(3, 5, 8, 0.99));
      border: 1px solid rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }

    .scorebug::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 28%, transparent 72%, rgba(255, 255, 255, 0.03)),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 106px);
      pointer-events: none;
    }

    .top-ribbon {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      line-height: 1;
      letter-spacing: 2.8px;
      font-weight: 700;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.92);
      z-index: 2;
      white-space: nowrap;
    }

    .panel {
      position: relative;
      z-index: 1;
      min-width: 0;
      border-left: 1px solid var(--line);
    }

    .panel:first-of-type {
      border-left: 0;
    }

    .logo-panel {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 28%, rgba(255, 255, 255, 0.02)),
        linear-gradient(180deg, #fefefe, #d9d9d9);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 20px 12px 8px;
    }

    .logo-frame {
      width: 100%;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.06));
      border: 1px solid rgba(0, 0, 0, 0.22);
      overflow: hidden;
    }

    .logo-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.24));
    }

    .logo-frame.is-empty::after {
      content: attr(data-fallback);
      font-size: 46px;
      font-weight: 800;
      color: rgba(16, 18, 20, 0.46);
      letter-spacing: 1px;
    }

    .team-panel {
      display: grid;
      grid-template-columns: 1fr 74px;
      align-items: center;
      padding: 38px 16px 10px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 34%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.025), rgba(0, 0, 0, 0.18));
    }

    .team-panel.home-panel {
      grid-template-columns: 74px 1fr;
    }

    .team-info {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .team-info.home-info {
      text-align: right;
    }

    .team-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      min-width: 0;
    }

    .team-row.home-row {
      justify-content: flex-end;
    }

    .team-code {
      font-size: 40px;
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .team-record {
      font-family: "Rajdhani", sans-serif;
      font-size: 18px;
      line-height: 1;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 3px;
      white-space: nowrap;
    }

    .bonus {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
    }

    .bonus.home-bonus {
      justify-content: flex-end;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.22);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.25);
    }

    .dot.active {
      background: var(--gold);
      box-shadow: 0 0 8px rgba(243, 197, 29, 0.28);
    }

    .score {
      font-family: "Rajdhani", sans-serif;
      font-size: 64px;
      line-height: 0.9;
      font-weight: 700;
      text-align: center;
    }

    .center-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 22px 10px 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 26%),
        linear-gradient(180deg, var(--panel-soft), var(--panel));
      text-align: center;
    }

    .game-clock {
      font-family: "Rajdhani", sans-serif;
      font-size: 58px;
      line-height: 0.9;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .period {
      font-size: 26px;
      line-height: 1;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.9);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .brand {
      margin-top: 4px;
      font-size: 25px;
      line-height: 1;
      font-style: italic;
      font-weight: 800;
      color: var(--brand);
      letter-spacing: 0.6px;
    }

    .status {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 11px;
      line-height: 1;
      letter-spacing: 1.2px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.72);
      text-transform: uppercase;
    }

    .status.running {
      color: #93f6b2;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="scorebug-wrap">
      <div class="scorebug">
        <div class="top-ribbon">Made Hoops Invitational</div>

        <div class="panel logo-panel">
          <div class="logo-frame is-empty" id="awayLogoFrame" data-fallback="A">
            <img id="awayLogo" alt="Away team logo" hidden />
          </div>
        </div>

        <div class="panel team-panel away-panel">
          <div class="team-info">
            <div class="team-row">
              <div class="team-code" id="awayName">AWAY</div>
              <div class="team-record" id="awayRecord">0-0</div>
            </div>
            <div class="bonus" id="awayBonus">
              <span class="dot active"></span>
              <span class="dot active"></span>
              <span class="dot active"></span>
              <span class="dot active"></span>
              <span class="dot active"></span>
            </div>
          </div>
          <div class="score" id="awayScore">0</div>
        </div>

        <div class="panel center-panel">
          <div class="status" id="statusBadge">Paused</div>
          <div class="game-clock" id="gameClock">8:00</div>
          <div class="period" id="periodLabel">1st</div>
          <div class="brand">NSMT</div>
        </div>

        <div class="panel team-panel home-panel">
          <div class="score" id="homeScore">0</div>
          <div class="team-info home-info">
            <div class="team-row home-row">
              <div class="team-code" id="homeName">HOME</div>
              <div class="team-record" id="homeRecord">0-0</div>
            </div>
            <div class="bonus home-bonus" id="homeBonus">
              <span class="dot active"></span>
              <span class="dot active"></span>
              <span class="dot active"></span>
              <span class="dot active"></span>
              <span class="dot active"></span>
            </div>
          </div>
        </div>

        <div class="panel logo-panel">
          <div class="logo-frame is-empty" id="homeLogoFrame" data-fallback="H">
            <img id="homeLogo" alt="Home team logo" hidden />
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const isFile = location.protocol === "file:";
      const WS_URL = isFile || location.hostname === "localhost"
        ? "ws://localhost:8765"
        : "ws://" + location.host.replace(/:\d+$/, "") + ":8765";

      const ASSET_BASE = isFile ? "http://localhost:8000/" : location.origin + "/";

      const defaults = {
        homeName: "MAU",
        awayName: "HRT",
        homeScore: 0,
        awayScore: 0,
        clock: "8:00",
        clockRunning: false,
        quarter: "1st",
        homeLogo: "",
        awayLogo: "",
        homePrimary: "#0e8f47",
        awayPrimary: "#0b51c5",
        homeRecord: "12-3",
        awayRecord: "11-4"
      };

      let state = { bug: Object.assign({}, defaults) };
      let ws = null;

      const els = {
        awayName: document.getElementById("awayName"),
        homeName: document.getElementById("homeName"),
        awayScore: document.getElementById("awayScore"),
        homeScore: document.getElementById("homeScore"),
        awayRecord: document.getElementById("awayRecord"),
        homeRecord: document.getElementById("homeRecord"),
        gameClock: document.getElementById("gameClock"),
        periodLabel: document.getElementById("periodLabel"),
        statusBadge: document.getElementById("statusBadge"),
        awayLogo: document.getElementById("awayLogo"),
        homeLogo: document.getElementById("homeLogo"),
        awayLogoFrame: document.getElementById("awayLogoFrame"),
        homeLogoFrame: document.getElementById("homeLogoFrame")
      };

      function updateScale() {
        const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        document.documentElement.style.setProperty("--scale", String(scale || 1));
      }

      function sanitizeColor(value, fallback) {
        if (typeof value !== "string") return fallback;
        const candidate = value.trim();
        if (!candidate) return fallback;
        const probe = new Option().style;
        probe.color = "";
        probe.color = candidate;
        return probe.color ? candidate : fallback;
      }

      function abbreviate(name, fallback) {
        const text = String(name || fallback || "").trim();
        if (!text) return fallback || "?";
        const parts = text.split(/\s+/).filter(Boolean);
        if (parts.length === 1) return parts[0].slice(0, 3).toUpperCase();
        return parts.slice(0, 3).map(function (part) { return part.charAt(0); }).join("").toUpperCase();
      }

      function resolveAsset(url) {
        const value = String(url || "").trim();
        if (!value) return "";
        if (/^[a-z][a-z0-9+.-]*:/i.test(value)) return value;
        if (value.startsWith("/")) return (location.protocol === "file:" ? "http://localhost:8000" : "") + value;
        return ASSET_BASE + value;
      }

      function applyLogo(imgEl, frameEl, url, fallbackText) {
        const resolved = resolveAsset(url);
        frameEl.dataset.fallback = fallbackText;
        frameEl.classList.add("is-empty");
        imgEl.hidden = true;
        imgEl.removeAttribute("src");

        if (!resolved) return;

        imgEl.onload = function () {
          frameEl.classList.remove("is-empty");
          imgEl.hidden = false;
        };

        imgEl.onerror = function () {
          frameEl.classList.add("is-empty");
          imgEl.hidden = true;
          imgEl.removeAttribute("src");
        };

        imgEl.src = resolved;
      }

      function formatQuarter(value) {
        const text = String(value == null ? "" : value).trim();
        if (!text) return "1st";
        return text;
      }

      function render() {
        const bug = Object.assign({}, defaults, state.bug || {});
        document.documentElement.style.setProperty("--away", sanitizeColor(bug.awayPrimary, defaults.awayPrimary));
        document.documentElement.style.setProperty("--home", sanitizeColor(bug.homePrimary, defaults.homePrimary));

        els.awayName.textContent = abbreviate(bug.awayName || defaults.awayName, "AWY");
        els.homeName.textContent = abbreviate(bug.homeName || defaults.homeName, "HOM");
        els.awayRecord.textContent = String(bug.awayRecord || defaults.awayRecord);
        els.homeRecord.textContent = String(bug.homeRecord || defaults.homeRecord);
        els.awayScore.textContent = String(bug.awayScore ?? 0);
        els.homeScore.textContent = String(bug.homeScore ?? 0);
        els.gameClock.textContent = String(bug.clock || defaults.clock);
        els.periodLabel.textContent = formatQuarter(bug.quarter);

        const running = !!bug.clockRunning;
        els.statusBadge.textContent = running ? "Running" : "Paused";
        els.statusBadge.classList.toggle("running", running);

        applyLogo(els.awayLogo, els.awayLogoFrame, bug.awayLogo, abbreviate(bug.awayName, "A"));
        applyLogo(els.homeLogo, els.homeLogoFrame, bug.homeLogo, abbreviate(bug.homeName, "H"));
      }

      function applyIncoming(data) {
        if (!data) return;
        if (data.type === "snapshot" || data.type === "state") {
          state = data.data || state;
          render();
          return;
        }
        if (data.bug) {
          state.bug = Object.assign({}, state.bug || defaults, data.bug);
          render();
        }
      }

      function connect() {
        ws = new WebSocket(WS_URL);

        ws.onopen = function () {
          ws.send(JSON.stringify({ type: "get_state" }));
        };

        ws.onmessage = function (event) {
          try {
            applyIncoming(JSON.parse(event.data));
          } catch (error) {
            console.warn("Invalid WebSocket payload:", error);
          }
        };

        ws.onclose = function () {
          window.setTimeout(connect, 1000);
        };

        ws.onerror = function () {
          ws.close();
        };
      }

      window.addEventListener("resize", updateScale);
      document.addEventListener("DOMContentLoaded", function () {
        updateScale();
        render();
        connect();
      });
    })();
  </script>
</body>
</html>
