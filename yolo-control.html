<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NSMT Control Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0b0e;
  --card: #111318;
  --card-border: #1e2028;
  --input-bg: #161820;
  --text: #e4e4e8;
  --dim: #7a7d8a;
  --accent: #0E80FC;
  --accent-dim: rgba(14,128,252,0.12);
  --green: #34d058;
  --red: #f04040;
  --gold: #f0c030;
}

html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  padding: 12px;
  padding-bottom: 80px;
  min-height: 100dvh;
}

/* ── Header ── */
.hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 12px; margin-bottom: 14px;
  border-bottom: 1px solid var(--card-border);
}
.hdr h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.2rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--accent);
}
.badge {
  font-size: 0.7rem; font-weight: 600;
  padding: 3px 10px; border-radius: 12px;
  background: rgba(240,64,64,0.15); color: var(--red);
}
.badge.on { background: rgba(52,208,88,0.15); color: var(--green); }

/* ── Cards ── */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 12px;
}
.card-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.7rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--dim); margin-bottom: 10px;
}

/* ── Inputs ── */
label { display: block; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); margin-bottom: 3px; }
input[type="text"], input[type="number"], select {
  width: 100%; background: var(--input-bg); border: 1px solid var(--card-border);
  border-radius: 6px; color: var(--text); font-size: 0.95rem; padding: 9px 10px;
  font-family: inherit; outline: none;
}
input:focus, select:focus { border-color: var(--accent); }
input[type="color"] { height: 38px; padding: 2px; border-radius: 6px; background: var(--input-bg); border: 1px solid var(--card-border); cursor: pointer; }
input[type="range"] { width: 100%; accent-color: var(--accent); }

.row { display: flex; gap: 8px; }
.row > * { flex: 1; min-width: 0; }
.field { margin-bottom: 8px; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--input-bg); border: 1px solid var(--card-border);
  color: var(--text); font-family: 'Space Grotesk', sans-serif;
  font-size: 0.95rem; font-weight: 600; border-radius: 8px;
  padding: 10px 14px; cursor: pointer;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none;
}
.btn:active { background: var(--accent); border-color: var(--accent); }
.btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-red { background: rgba(240,64,64,0.12); border-color: var(--red); color: var(--red); }
.btn-green { background: rgba(52,208,88,0.12); border-color: var(--green); color: var(--green); }
.btn-gold { background: rgba(240,192,48,0.12); border-color: var(--gold); color: var(--gold); }
.btn-sm { font-size: 0.8rem; padding: 7px 10px; }

/* ── Team Cards ── */
.teams { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.team-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 10px; padding: 12px; }
.logo-preview { width: 64px; height: 64px; object-fit: contain; border-radius: 6px; border: 1px solid var(--card-border); background: var(--input-bg); display: block; margin-bottom: 6px; }
.logo-preview.empty { display: none; }
.file-btn { font-size: 0.75rem; padding: 6px 10px; margin-bottom: 8px; width: 100%; }
.color-row { display: flex; gap: 6px; align-items: end; }
.color-row .field { flex: 1; }

/* ── Score ── */
.score-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; }
.score-side { text-align: center; }
.score-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); margin-bottom: 4px; }
.score-num { font-family: 'Space Grotesk', sans-serif; font-size: 3.2rem; font-weight: 700; line-height: 1; margin: 6px 0; }
.score-btns { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
.vs { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--dim); padding-top: 20px; }

/* ── Possession ── */
.poss-row { display: flex; gap: 6px; margin-top: 10px; }
.poss-btn { flex: 1; text-align: center; padding: 10px; border-radius: 8px; background: var(--input-bg); border: 1px solid var(--card-border); color: var(--dim); font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.poss-btn.on { border-color: var(--gold); color: var(--gold); background: rgba(240,192,48,0.08); }

/* ── Clock ── */
.clock-num { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; font-weight: 700; text-align: center; margin: 6px 0; }
.clock-btns { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
.period-btns { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.period-btns .btn { flex: 1; min-width: 48px; }
.period-btns .btn.on { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* ── Fouls/Timeouts ── */
.ft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ft-item { text-align: center; }
.ft-label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); margin-bottom: 2px; }
.ft-num { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; margin: 4px 0; }
.ft-btns { display: flex; gap: 4px; justify-content: center; }

/* ── Sliders ── */
.slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.slider-row label { margin-bottom: 0; flex-shrink: 0; width: 80px; }
.slider-row input[type="range"] { flex: 1; }
.slider-val { font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 600; min-width: 44px; text-align: right; }

/* ── Toggle ── */
.toggle-row { display: flex; gap: 8px; }
.toggle-row .btn { flex: 1; }

@media (max-width: 520px) {
  .teams { grid-template-columns: 1fr; }
  .score-grid { grid-template-columns: 1fr 1fr; }
  .vs { display: none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <h1>NSMT Control</h1>
  <span class="badge" id="badge">Offline</span>
</div>

<!-- GAME SETUP -->
<div class="card">
  <div class="card-title">Game Setup</div>
  <div class="field">
    <label>Event Title</label>
    <input type="text" id="eventTitle" placeholder="CHIPOTLE NATIONALS - QUARTERFINAL">
  </div>
  <div class="card-title" style="margin-top:6px">Period</div>
  <div class="period-btns" id="periodBtns">
    <button class="btn btn-sm on" data-p="1ST">1ST</button>
    <button class="btn btn-sm" data-p="2ND">2ND</button>
    <button class="btn btn-sm" data-p="3RD">3RD</button>
    <button class="btn btn-sm" data-p="4TH">4TH</button>
    <button class="btn btn-sm" data-p="OT">OT</button>
    <button class="btn btn-sm" data-p="HALF">HALF</button>
    <button class="btn btn-sm" data-p="FINAL">FINAL</button>
  </div>
</div>

<!-- TEAMS -->
<div class="teams">
  <!-- Away -->
  <div class="team-card">
    <div class="card-title">Away</div>
    <img class="logo-preview empty" id="awayLogoPreview">
    <button class="btn btn-sm file-btn" onclick="pickLogo('away')">Upload Logo</button>
    <input type="file" id="awayFileInput" accept="image/*" style="display:none">
    <div class="field"><label>Name</label><input type="text" id="awayName" placeholder="Team Name"></div>
    <div class="field"><label>Code</label><input type="text" id="awayCode" placeholder="ABC" maxlength="4"></div>
    <div class="field"><label>Record</label><input type="text" id="awayRecord" placeholder="12-3"></div>
    <div class="color-row">
      <div class="field"><label>Primary</label><input type="color" id="awayPrimary" value="#333333"></div>
      <div class="field"><label>Text</label><input type="color" id="awayText" value="#ffffff"></div>
    </div>
  </div>
  <!-- Home -->
  <div class="team-card">
    <div class="card-title">Home</div>
    <img class="logo-preview empty" id="homeLogoPreview">
    <button class="btn btn-sm file-btn" onclick="pickLogo('home')">Upload Logo</button>
    <input type="file" id="homeFileInput" accept="image/*" style="display:none">
    <div class="field"><label>Name</label><input type="text" id="homeName" placeholder="Team Name"></div>
    <div class="field"><label>Code</label><input type="text" id="homeCode" placeholder="XYZ" maxlength="4"></div>
    <div class="field"><label>Record</label><input type="text" id="homeRecord" placeholder="11-4"></div>
    <div class="color-row">
      <div class="field"><label>Primary</label><input type="color" id="homePrimary" value="#333333"></div>
      <div class="field"><label>Text</label><input type="color" id="homeText" value="#ffffff"></div>
    </div>
  </div>
</div>

<!-- SCORE -->
<div class="card">
  <div class="card-title">Score</div>
  <div class="score-grid">
    <div class="score-side">
      <div class="score-label" id="awayScoreLabel">AWAY</div>
      <div class="score-num" id="awayScoreNum">0</div>
      <div class="score-btns">
        <button class="btn btn-sm" onclick="adj('away',-1)">-1</button>
        <button class="btn btn-sm btn-accent" onclick="adj('away',1)">+1</button>
        <button class="btn btn-sm btn-accent" onclick="adj('away',2)">+2</button>
        <button class="btn btn-sm btn-accent" onclick="adj('away',3)">+3</button>
      </div>
    </div>
    <div class="vs">VS</div>
    <div class="score-side">
      <div class="score-label" id="homeScoreLabel">HOME</div>
      <div class="score-num" id="homeScoreNum">0</div>
      <div class="score-btns">
        <button class="btn btn-sm" onclick="adj('home',-1)">-1</button>
        <button class="btn btn-sm btn-accent" onclick="adj('home',1)">+1</button>
        <button class="btn btn-sm btn-accent" onclick="adj('home',2)">+2</button>
        <button class="btn btn-sm btn-accent" onclick="adj('home',3)">+3</button>
      </div>
    </div>
  </div>
  <div class="poss-row">
    <div class="poss-btn" id="possAway" onclick="setPoss('away')">&#9664; AWAY</div>
    <div class="poss-btn" id="possNone" onclick="setPoss('')">NONE</div>
    <div class="poss-btn" id="possHome" onclick="setPoss('home')">HOME &#9654;</div>
  </div>
</div>

<!-- CLOCK -->
<div class="card">
  <div class="card-title">Game Clock</div>
  <div class="clock-num" id="clockDisplay">8:00</div>
  <div class="clock-btns">
    <button class="btn btn-green" id="clockStartBtn" onclick="startClock()">Start</button>
    <button class="btn btn-red" onclick="stopClock()">Stop</button>
    <button class="btn" onclick="resetClock()">Reset</button>
  </div>
  <div class="clock-btns" style="margin-top:6px">
    <button class="btn btn-sm" onclick="setClockTo('8:00')">8:00</button>
    <button class="btn btn-sm" onclick="setClockTo('5:00')">5:00</button>
    <button class="btn btn-sm" onclick="setClockTo('4:00')">4:00</button>
    <button class="btn btn-sm" onclick="setClockTo('2:00')">2:00</button>
  </div>
  <div class="field" style="margin-top:8px">
    <label>Custom Clock</label>
    <input type="text" id="customClock" placeholder="M:SS" inputmode="numeric">
  </div>
</div>

<!-- FOULS & TIMEOUTS -->
<div class="card">
  <div class="card-title">Fouls</div>
  <div class="ft-grid">
    <div class="ft-item">
      <div class="ft-label" id="awayFoulLabel">AWAY</div>
      <div class="ft-num" id="awayFoulsNum">0</div>
      <div class="ft-btns">
        <button class="btn btn-sm" onclick="adjFoul('away',-1)">-1</button>
        <button class="btn btn-sm btn-accent" onclick="adjFoul('away',1)">+1</button>
      </div>
    </div>
    <div class="ft-item">
      <div class="ft-label" id="homeFoulLabel">HOME</div>
      <div class="ft-num" id="homeFoulsNum">0</div>
      <div class="ft-btns">
        <button class="btn btn-sm" onclick="adjFoul('home',-1)">-1</button>
        <button class="btn btn-sm btn-accent" onclick="adjFoul('home',1)">+1</button>
      </div>
    </div>
  </div>
  <div class="card-title" style="margin-top:10px">Timeouts</div>
  <div class="ft-grid">
    <div class="ft-item">
      <div class="ft-label" id="awayTOLabel">AWAY</div>
      <div class="ft-num" id="awayTOsNum">5</div>
      <div class="ft-btns">
        <button class="btn btn-sm" onclick="adjTO('away',-1)">-1</button>
        <button class="btn btn-sm btn-accent" onclick="adjTO('away',1)">+1</button>
        <button class="btn btn-sm btn-gold" onclick="rstTO('away')">RST</button>
      </div>
    </div>
    <div class="ft-item">
      <div class="ft-label" id="homeTOLabel">HOME</div>
      <div class="ft-num" id="homeTOsNum">5</div>
      <div class="ft-btns">
        <button class="btn btn-sm" onclick="adjTO('home',-1)">-1</button>
        <button class="btn btn-sm btn-accent" onclick="adjTO('home',1)">+1</button>
        <button class="btn btn-sm btn-gold" onclick="rstTO('home')">RST</button>
      </div>
    </div>
  </div>
</div>

<!-- OVERLAY CONTROLS -->
<div class="card">
  <div class="card-title">Overlay Controls</div>
  <div class="slider-row">
    <label>Bug Scale</label>
    <input type="range" id="scaleSlider" min="0.5" max="2" step="0.05" value="1.25">
    <span class="slider-val" id="scaleVal">1.25</span>
  </div>
  <div class="slider-row">
    <label>Logo Size</label>
    <input type="range" id="logoSizeSlider" min="48" max="200" step="4" value="160">
    <span class="slider-val" id="logoSizeVal">160px</span>
  </div>
  <div class="toggle-row" style="margin-top:8px">
    <button class="btn btn-green" onclick="patch({visible:true})">Show Bug</button>
    <button class="btn btn-red" onclick="patch({visible:false})">Hide Bug</button>
  </div>
</div>

<canvas id="colorCanvas" style="display:none"></canvas>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
(function(){
  firebase.initializeApp({
    apiKey: "AIzaSyD_ObMxqLz2LiuDiU4TWDT7G5FtWDeK_sI",
    authDomain: "sincere-nirvana-436014-v9.firebaseapp.com",
    databaseURL: "https://nsmt-scorebug.firebaseio.com",
    projectId: "sincere-nirvana-436014-v9",
    storageBucket: "sincere-nirvana-436014-v9.firebasestorage.app",
    appId: "1:417098775531:web:d1d88da74d217ecbd5f7ae"
  });
  var db = firebase.database();
  var stateRef = db.ref('state');
  var bugRef = stateRef.child('bug');
  var state = {};

  // ── Connection badge ──
  db.ref('.info/connected').on('value', function(s){
    var b = document.getElementById('badge');
    if(s.val()){ b.textContent='Live'; b.classList.add('on'); }
    else { b.textContent='Offline'; b.classList.remove('on'); }
  });

  // ── Patch helper ──
  window.patch = function(fields){
    var updates = {};
    for(var k in fields) updates['bug/'+k] = fields[k];
    stateRef.update(updates);
  };

  // ── Listen for state ──
  stateRef.on('value', function(snap){
    state = snap.val() || {};
    syncUI();
  });

  function safe(id){ return document.getElementById(id); }
  function setIfBlur(id, val){
    var el = safe(id);
    if(document.activeElement !== el && val !== undefined) el.value = val ?? '';
  }

  function syncUI(){
    var b = state.bug || {};

    setIfBlur('eventTitle', b.eventTitle);
    setIfBlur('awayName', b.awayName);
    setIfBlur('homeName', b.homeName);
    setIfBlur('awayCode', b.awayCode);
    setIfBlur('homeCode', b.homeCode);
    setIfBlur('awayRecord', b.awayRecord);
    setIfBlur('homeRecord', b.homeRecord);
    setIfBlur('awayPrimary', b.awayPrimary || '#333333');
    setIfBlur('homePrimary', b.homePrimary || '#333333');
    setIfBlur('awayText', b.awayText || '#ffffff');
    setIfBlur('homeText', b.homeText || '#ffffff');

    // Logos
    showLogo('away', b.awayLogo);
    showLogo('home', b.homeLogo);

    // Scores
    safe('awayScoreNum').textContent = b.awayScore ?? 0;
    safe('homeScoreNum').textContent = b.homeScore ?? 0;
    safe('awayScoreLabel').textContent = b.awayCode || b.awayName || 'AWAY';
    safe('homeScoreLabel').textContent = b.homeCode || b.homeName || 'HOME';

    // Clock — sync from Firebase but don't fight local countdown
    if(b.clockRunning && !localClockRunning){
      localClockMs = parseClock(b.clock || '8:00');
      startLocalClock();
    } else if(!b.clockRunning && localClockRunning){
      stopLocalClock();
      localClockMs = parseClock(b.clock || '8:00');
      safe('clockDisplay').textContent = b.clock || '8:00';
    } else if(!b.clockRunning && !localClockRunning){
      localClockMs = parseClock(b.clock || '8:00');
      safe('clockDisplay').textContent = b.clock || '8:00';
    }

    // Period buttons
    var btns = document.querySelectorAll('#periodBtns .btn');
    btns.forEach(function(btn){ btn.classList.toggle('on', btn.dataset.p === (b.quarter||'1ST')); });

    // Possession
    safe('possAway').classList.toggle('on', b.possession==='away');
    safe('possNone').classList.toggle('on', !b.possession);
    safe('possHome').classList.toggle('on', b.possession==='home');

    // Fouls & TOs
    safe('awayFoulsNum').textContent = b.awayFouls ?? 0;
    safe('homeFoulsNum').textContent = b.homeFouls ?? 0;
    safe('awayTOsNum').textContent = b.awayTOs ?? 5;
    safe('homeTOsNum').textContent = b.homeTOs ?? 5;
    safe('awayFoulLabel').textContent = b.awayCode || b.awayName || 'AWAY';
    safe('homeFoulLabel').textContent = b.homeCode || b.homeName || 'HOME';
    safe('awayTOLabel').textContent = b.awayCode || b.awayName || 'AWAY';
    safe('homeTOLabel').textContent = b.homeCode || b.homeName || 'HOME';

    // Sliders
    setIfBlur('scaleSlider', b.bugScale || 1.25);
    safe('scaleVal').textContent = b.bugScale || 1.25;
    setIfBlur('logoSizeSlider', b.bugLogoSize || 160);
    safe('logoSizeVal').textContent = (b.bugLogoSize || 160) + 'px';
  }

  function showLogo(side, dataUrl){
    var img = safe(side+'LogoPreview');
    if(dataUrl){
      img.src = dataUrl;
      img.classList.remove('empty');
    } else {
      img.classList.add('empty');
      img.removeAttribute('src');
    }
  }

  // ── Score ──
  window.adj = function(side, delta){
    bugRef.child(side+'Score').transaction(function(v){ return Math.max(0,(v||0)+delta); });
  };

  // ── Possession ──
  window.setPoss = function(val){ patch({possession:val}); };

  // ── Clock ──
  var localClockInterval = null;
  var localClockMs = 0;
  var localClockRunning = false;
  var localClockStartPerf = 0;
  var localClockStartMs = 0;

  function parseClock(text){
    var parts = String(text||'0:00').split(':');
    var m = parseInt(parts[0])||0;
    var s = parseInt(parts[1])||0;
    return (m*60+s)*1000;
  }
  function fmtClock(ms){
    if(ms<0) ms=0;
    var totalS = Math.floor(ms/1000);
    var m = Math.floor(totalS/60);
    var s = totalS%60;
    return m+':'+String(s).padStart(2,'0');
  }

  function startLocalClock(){
    if(localClockRunning) return;
    localClockRunning = true;
    localClockStartPerf = performance.now();
    localClockStartMs = localClockMs;
    localClockInterval = setInterval(function(){
      var elapsed = performance.now() - localClockStartPerf;
      localClockMs = Math.max(0, localClockStartMs - elapsed);
      safe('clockDisplay').textContent = fmtClock(localClockMs);
      if(localClockMs <= 0){
        clearInterval(localClockInterval);
        localClockRunning = false;
        patch({clock:'0:00', clockRunning:false});
      }
    }, 100);
  }

  function stopLocalClock(){
    if(!localClockRunning) return;
    clearInterval(localClockInterval);
    var elapsed = performance.now() - localClockStartPerf;
    localClockMs = Math.max(0, localClockStartMs - elapsed);
    localClockRunning = false;
  }

  window.startClock = function(){
    var display = safe('clockDisplay').textContent;
    localClockMs = parseClock(display);
    startLocalClock();
    patch({clock:display, clockRunning:true});
  };
  window.stopClock = function(){
    stopLocalClock();
    var display = fmtClock(localClockMs);
    safe('clockDisplay').textContent = display;
    patch({clock:display, clockRunning:false});
  };
  window.resetClock = function(){
    stopLocalClock();
    var q = (state.bug||{}).quarter||'1ST';
    var def = q==='OT' ? '5:00' : '8:00';
    localClockMs = parseClock(def);
    safe('clockDisplay').textContent = def;
    patch({clock:def, clockRunning:false});
  };
  window.setClockTo = function(val){
    stopLocalClock();
    localClockMs = parseClock(val);
    safe('clockDisplay').textContent = val;
    patch({clock:val, clockRunning:false});
  };

  // Custom clock
  safe('customClock').addEventListener('change', function(){
    if(this.value){ window.setClockTo(this.value); this.value=''; }
  });

  // ── Fouls ──
  window.adjFoul = function(side, delta){
    var cur = ((state.bug||{})[side+'Fouls']) || 0;
    patch({[side+'Fouls']: Math.max(0, cur+delta)});
  };

  // ── Timeouts ──
  window.adjTO = function(side, delta){
    var cur = ((state.bug||{})[side+'TOs']) ?? 5;
    patch({[side+'TOs']: Math.max(0, Math.min(5, cur+delta))});
  };
  window.rstTO = function(side){ patch({[side+'TOs']:5}); };

  // ── Period ──
  document.querySelectorAll('#periodBtns .btn').forEach(function(btn){
    btn.addEventListener('click', function(){ patch({quarter:btn.dataset.p}); });
  });

  // ── Debounced text inputs ──
  var timers = {};
  function bindText(id, key){
    safe(id).addEventListener('input', function(){
      var el = this;
      clearTimeout(timers[id]);
      timers[id] = setTimeout(function(){ patch({[key]:el.value}); }, 250);
    });
  }
  bindText('eventTitle','eventTitle');
  bindText('awayName','awayName');
  bindText('homeName','homeName');
  bindText('awayCode','awayCode');
  bindText('homeCode','homeCode');
  bindText('awayRecord','awayRecord');
  bindText('homeRecord','homeRecord');

  // ── Color pickers ──
  function bindColor(id, key){
    safe(id).addEventListener('input', function(){
      clearTimeout(timers[id]);
      var el = this;
      timers[id] = setTimeout(function(){ patch({[key]:el.value}); }, 100);
    });
  }
  bindColor('awayPrimary','awayPrimary');
  bindColor('homePrimary','homePrimary');
  bindColor('awayText','awayText');
  bindColor('homeText','homeText');

  // ── Sliders ──
  safe('scaleSlider').addEventListener('input', function(){
    safe('scaleVal').textContent = this.value;
    clearTimeout(timers.scale);
    var v = parseFloat(this.value);
    timers.scale = setTimeout(function(){ patch({bugScale:v}); }, 100);
  });
  safe('logoSizeSlider').addEventListener('input', function(){
    safe('logoSizeVal').textContent = this.value+'px';
    clearTimeout(timers.logoSize);
    var v = parseInt(this.value);
    timers.logoSize = setTimeout(function(){ patch({bugLogoSize:v}); }, 100);
  });

  // ── Logo Upload with Auto Color Extraction ──
  window.pickLogo = function(side){
    safe(side+'FileInput').click();
  };

  safe('awayFileInput').addEventListener('change', function(){ handleLogo('away', this); });
  safe('homeFileInput').addEventListener('change', function(){ handleLogo('home', this); });

  function handleLogo(side, input){
    var file = input.files[0];
    if(!file) return;

    if(file.size > 500000){
      alert('Logo file is large ('+Math.round(file.size/1024)+'KB). Consider using a smaller image for faster sync.');
    }

    var reader = new FileReader();
    reader.onload = function(e){
      var dataUrl = e.target.result;
      patch({[side+'Logo']: dataUrl});

      // Extract dominant color
      var img = new Image();
      img.onload = function(){
        var colors = extractColors(img);
        if(colors){
          patch({
            [side+'Primary']: colors.primary,
            [side+'Text']: colors.text,
            [side+'Accent']: colors.accent
          });
          safe(side+'Primary').value = colors.primary;
          safe(side+'Text').value = colors.text;
        }
      };
      img.src = dataUrl;
    };
    reader.readAsDataURL(file);
    input.value = '';
  }

  function extractColors(img){
    var canvas = safe('colorCanvas');
    var ctx = canvas.getContext('2d');
    var size = 64;
    canvas.width = size; canvas.height = size;
    ctx.drawImage(img, 0, 0, size, size);

    var data = ctx.getImageData(0, 0, size, size).data;
    var buckets = {};

    for(var i = 0; i < data.length; i += 4){
      var r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
      if(a < 128) continue; // skip transparent

      var lum = (0.299*r + 0.587*g + 0.114*b) / 255;
      if(lum > 0.9 || lum < 0.08) continue; // skip near-white/near-black

      // Quantize to reduce noise
      var qr = Math.round(r/16)*16;
      var qg = Math.round(g/16)*16;
      var qb = Math.round(b/16)*16;
      var key = qr+','+qg+','+qb;

      // Weight saturated colors higher
      var max = Math.max(r,g,b), min = Math.min(r,g,b);
      var sat = max === 0 ? 0 : (max-min)/max;
      var weight = 1 + sat * 3;

      buckets[key] = (buckets[key]||0) + weight;
    }

    var best = null, bestCount = 0;
    for(var k in buckets){
      if(buckets[k] > bestCount){
        bestCount = buckets[k];
        best = k;
      }
    }

    if(!best) return null;

    var parts = best.split(',');
    var pr = parseInt(parts[0]), pg = parseInt(parts[1]), pb = parseInt(parts[2]);
    var hex = '#' + pr.toString(16).padStart(2,'0') + pg.toString(16).padStart(2,'0') + pb.toString(16).padStart(2,'0');

    var lumP = (0.299*pr + 0.587*pg + 0.114*pb) / 255;
    var textColor = lumP > 0.55 ? '#111111' : '#ffffff';

    return { primary: hex, text: textColor, accent: '#CCCCCC' };
  }
})();
</script>
</body>
</html>
