<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NSMT Control Hub — YoloBox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c0d10;
    --surface: #16181d;
    --surface2: #1e2027;
    --border: #2a2d35;
    --text: #e8e8ea;
    --text-dim: #8b8d95;
    --accent: #0E80FC;
    --accent-dim: rgba(14,128,252,0.15);
    --gold: #f0c030;
    --red: #ef4444;
    --green: #22c55e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    padding: 16px;
    padding-bottom: 100px;
  }

  /* ─── HEADER ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .conn-badge {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(239,68,68,0.2);
    color: var(--red);
  }
  .conn-badge.connected {
    background: rgba(34,197,94,0.2);
    color: var(--green);
  }

  /* ─── SECTIONS ─── */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  /* ─── INPUTS ─── */
  .field {
    margin-bottom: 10px;
  }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .field input, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 16px;
    padding: 10px 12px;
    outline: none;
    font-family: inherit;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  .field input[type="color"] {
    height: 44px;
    padding: 4px;
    cursor: pointer;
  }

  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  /* ─── SCORE CONTROLS ─── */
  .score-section {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
  }

  .team-score-ctrl {
    text-align: center;
  }
  .team-score-ctrl .team-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .score-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 56px;
    font-weight: 700;
    line-height: 1;
    margin: 8px 0;
    color: var(--text);
  }
  .score-btns {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 600;
    border-radius: 10px;
    padding: 12px 18px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:active {
    background: var(--accent);
    border-color: var(--accent);
  }
  .btn.accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.danger {
    background: rgba(239,68,68,0.15);
    border-color: var(--red);
    color: var(--red);
  }
  .btn.small {
    font-size: 14px;
    padding: 8px 14px;
  }
  .btn.gold {
    background: rgba(240,192,48,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  .vs-divider {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text-dim);
    padding-top: 30px;
  }

  /* ─── CLOCK CONTROLS ─── */
  .clock-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px;
    font-weight: 700;
    text-align: center;
    color: var(--text);
    margin: 8px 0;
  }
  .clock-btns {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  /* ─── POSSESSION TOGGLE ─── */
  .poss-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .poss-btn {
    flex: 1;
    text-align: center;
    padding: 14px;
    border-radius: 10px;
    background: var(--surface2);
    border: 2px solid var(--border);
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .poss-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(240,192,48,0.1);
  }

  /* ─── FOULS ─── */
  .fouls-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .fouls-team {
    flex: 1;
    text-align: center;
  }
  .fouls-team .team-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .fouls-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 700;
    margin: 4px 0;
  }
  .fouls-btns {
    display: flex;
    gap: 6px;
    justify-content: center;
  }

  /* ─── BONUS SELECT ─── */
  .bonus-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 6px;
  }
  .bonus-chip {
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .bonus-chip.active {
    background: rgba(240,192,48,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* ─── VISIBILITY TOGGLE ─── */
  .toggle-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>NSMT Control</h1>
  <span class="conn-badge" id="connBadge">Offline</span>
</div>

<!-- EVENT TITLE -->
<div class="section">
  <div class="section-title">Event</div>
  <div class="field">
    <label>Event Title (top bar)</label>
    <input type="text" id="eventTitle" placeholder="CHIPOTLE NATIONALS - QUARTERFINAL">
  </div>
</div>

<!-- TEAM SETUP -->
<div class="section">
  <div class="section-title">Teams</div>
  <div class="row">
    <div class="field">
      <label>Away Team</label>
      <input type="text" id="awayName" placeholder="PAUL VI (VA)">
    </div>
    <div class="field">
      <label>Home Team</label>
      <input type="text" id="homeName" placeholder="CIA BELLA VISTA (AZ)">
    </div>
  </div>
  <div class="row">
    <div class="field">
      <label>Away Seed</label>
      <input type="text" id="awaySeed" placeholder="6" inputmode="numeric">
    </div>
    <div class="field">
      <label>Home Seed</label>
      <input type="text" id="homeSeed" placeholder="3" inputmode="numeric">
    </div>
  </div>
  <div class="row">
    <div class="field">
      <label>Away Record</label>
      <input type="text" id="awayRecord" placeholder="12-3">
    </div>
    <div class="field">
      <label>Home Record</label>
      <input type="text" id="homeRecord" placeholder="11-4">
    </div>
  </div>
  <div class="row">
    <div class="field">
      <label>Away Logo URL</label>
      <input type="text" id="awayLogo" placeholder="https://...">
    </div>
    <div class="field">
      <label>Home Logo URL</label>
      <input type="text" id="homeLogo" placeholder="https://...">
    </div>
  </div>
</div>

<!-- SCORE -->
<div class="section">
  <div class="section-title">Score</div>
  <div class="score-section">
    <div class="team-score-ctrl">
      <div class="team-label" id="awayScoreLabel">AWAY</div>
      <div class="score-display" id="awayScoreDisplay">0</div>
      <div class="score-btns">
        <button class="btn" onclick="adjustScore('away',-1)">-1</button>
        <button class="btn accent" onclick="adjustScore('away',1)">+1</button>
        <button class="btn accent" onclick="adjustScore('away',2)">+2</button>
        <button class="btn accent" onclick="adjustScore('away',3)">+3</button>
      </div>
    </div>
    <div class="vs-divider">VS</div>
    <div class="team-score-ctrl">
      <div class="team-label" id="homeScoreLabel">HOME</div>
      <div class="score-display" id="homeScoreDisplay">0</div>
      <div class="score-btns">
        <button class="btn" onclick="adjustScore('home',-1)">-1</button>
        <button class="btn accent" onclick="adjustScore('home',1)">+1</button>
        <button class="btn accent" onclick="adjustScore('home',2)">+2</button>
        <button class="btn accent" onclick="adjustScore('home',3)">+3</button>
      </div>
    </div>
  </div>
</div>

<!-- CLOCK -->
<div class="section">
  <div class="section-title">Clock</div>
  <div class="clock-display" id="clockDisplay">8:00</div>
  <div class="clock-btns">
    <button class="btn accent" id="clockToggle" onclick="toggleClock()">START</button>
    <button class="btn" onclick="setClock('8:00')">8:00</button>
    <button class="btn" onclick="setClock('5:00')">5:00</button>
    <button class="btn" onclick="setClock('4:00')">4:00</button>
    <button class="btn danger" onclick="setClock('0:00')">0:00</button>
  </div>
  <div class="row" style="margin-top:10px">
    <div class="field">
      <label>Custom Clock</label>
      <input type="text" id="customClock" placeholder="M:SS" inputmode="numeric">
    </div>
    <div class="field">
      <label>Shot Clock</label>
      <input type="text" id="shotClock" placeholder="30" inputmode="numeric">
    </div>
  </div>
  <div class="row" style="margin-top:8px">
    <div class="field">
      <label>Period</label>
      <select id="quarter">
        <option>1ST</option>
        <option>2ND</option>
        <option>3RD</option>
        <option>4TH</option>
        <option>OT</option>
        <option>2OT</option>
        <option>HALF</option>
        <option>FINAL</option>
      </select>
    </div>
  </div>
</div>

<!-- POSSESSION -->
<div class="section">
  <div class="section-title">Possession</div>
  <div class="poss-row">
    <div class="poss-btn" id="possAway" onclick="setPossession('away')">← AWAY</div>
    <div class="poss-btn" id="possNone" onclick="setPossession('')">NONE</div>
    <div class="poss-btn" id="possHome" onclick="setPossession('home')">HOME →</div>
  </div>
</div>

<!-- TIMEOUTS -->
<div class="section">
  <div class="section-title">Timeouts</div>
  <div class="fouls-row">
    <div class="fouls-team">
      <div class="team-label" id="awayTOLabel">AWAY</div>
      <div class="fouls-count" id="awayTOsDisplay">5</div>
      <div class="fouls-btns">
        <button class="btn small" onclick="adjustTOs('away',-1)">-1</button>
        <button class="btn small accent" onclick="adjustTOs('away',1)">+1</button>
        <button class="btn small gold" onclick="resetTOs('away')">RST</button>
      </div>
    </div>
    <div class="fouls-team">
      <div class="team-label" id="homeTOLabel">HOME</div>
      <div class="fouls-count" id="homeTOsDisplay">5</div>
      <div class="fouls-btns">
        <button class="btn small" onclick="adjustTOs('home',-1)">-1</button>
        <button class="btn small accent" onclick="adjustTOs('home',1)">+1</button>
        <button class="btn small gold" onclick="resetTOs('home')">RST</button>
      </div>
    </div>
  </div>
</div>

<!-- FOULS -->
<div class="section">
  <div class="section-title">Fouls & Bonus</div>
  <div class="fouls-row">
    <div class="fouls-team">
      <div class="team-label" id="awayFoulLabel">AWAY</div>
      <div class="fouls-count" id="awayFoulsDisplay">0</div>
      <div class="fouls-btns">
        <button class="btn small" onclick="adjustFouls('away',-1)">-1</button>
        <button class="btn small accent" onclick="adjustFouls('away',1)">+1</button>
      </div>
      <div class="bonus-row">
        <div class="bonus-chip" data-team="away" data-val="" onclick="setBonus('away','')">—</div>
        <div class="bonus-chip" data-team="away" data-val="BONUS" onclick="setBonus('away','BONUS')">BONUS</div>
        <div class="bonus-chip" data-team="away" data-val="BONUS+" onclick="setBonus('away','BONUS+')">BONUS+</div>
      </div>
    </div>
    <div class="fouls-team">
      <div class="team-label" id="homeFoulLabel">HOME</div>
      <div class="fouls-count" id="homeFoulsDisplay">0</div>
      <div class="fouls-btns">
        <button class="btn small" onclick="adjustFouls('home',-1)">-1</button>
        <button class="btn small accent" onclick="adjustFouls('home',1)">+1</button>
      </div>
      <div class="bonus-row">
        <div class="bonus-chip" data-team="home" data-val="" onclick="setBonus('home','')">—</div>
        <div class="bonus-chip" data-team="home" data-val="BONUS" onclick="setBonus('home','BONUS')">BONUS</div>
        <div class="bonus-chip" data-team="home" data-val="BONUS+" onclick="setBonus('home','BONUS+')">BONUS+</div>
      </div>
    </div>
  </div>
</div>

<!-- SHOW/HIDE -->
<div class="section">
  <div class="section-title">Overlay</div>
  <div class="toggle-row">
    <button class="btn accent" style="flex:1" onclick="toggleVisibility(true)">SHOW BUG</button>
    <button class="btn danger" style="flex:1" onclick="toggleVisibility(false)">HIDE BUG</button>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-client.js"></script>

<script>
  // ─── State mirror ───
  let state = {};
  let clockRunning = false;

  // ─── Connect ───
  NSMTClient.onConnect(() => {
    const b = document.getElementById('connBadge');
    b.textContent = 'Live';
    b.classList.add('connected');
  });

  NSMTClient.onDisconnect(() => {
    const b = document.getElementById('connBadge');
    b.textContent = 'Offline';
    b.classList.remove('connected');
  });

  NSMTClient.onMessage((msg) => {
    if (msg.type === 'state' && msg.data) {
      state = msg.data;
      syncUI(state.bug || {});
    }
  });

  NSMTClient.connect();

  // ─── Sync UI from state ───
  function syncUI(bug) {
    // Only update inputs if they're not focused (don't fight the user)
    setIfNotFocused('eventTitle', bug.eventTitle);
    setIfNotFocused('awayName', bug.awayName);
    setIfNotFocused('homeName', bug.homeName);
    setIfNotFocused('awaySeed', bug.awaySeed);
    setIfNotFocused('homeSeed', bug.homeSeed);
    setIfNotFocused('awayRecord', bug.awayRecord);
    setIfNotFocused('homeRecord', bug.homeRecord);
    setIfNotFocused('awayLogo', bug.awayLogo);
    setIfNotFocused('homeLogo', bug.homeLogo);
    setIfNotFocused('shotClock', bug.shotClock);
    setIfNotFocused('quarter', bug.quarter || '1ST');

    // Score displays
    document.getElementById('awayScoreDisplay').textContent = bug.awayScore ?? 0;
    document.getElementById('homeScoreDisplay').textContent = bug.homeScore ?? 0;

    // Labels
    document.getElementById('awayScoreLabel').textContent = bug.awayName || 'AWAY';
    document.getElementById('homeScoreLabel').textContent = bug.homeName || 'HOME';
    document.getElementById('awayFoulLabel').textContent = bug.awayName || 'AWAY';
    document.getElementById('homeFoulLabel').textContent = bug.homeName || 'HOME';
    document.getElementById('awayTOLabel').textContent = bug.awayName || 'AWAY';
    document.getElementById('homeTOLabel').textContent = bug.homeName || 'HOME';

    // Timeouts
    document.getElementById('awayTOsDisplay').textContent = bug.awayTOs ?? 5;
    document.getElementById('homeTOsDisplay').textContent = bug.homeTOs ?? 5;

    // Clock
    document.getElementById('clockDisplay').textContent = bug.clock || '8:00';
    clockRunning = bug.clockRunning || false;
    document.getElementById('clockToggle').textContent = clockRunning ? 'STOP' : 'START';
    document.getElementById('clockToggle').classList.toggle('danger', clockRunning);
    document.getElementById('clockToggle').classList.toggle('accent', !clockRunning);

    // Fouls
    document.getElementById('awayFoulsDisplay').textContent = bug.awayFouls ?? 0;
    document.getElementById('homeFoulsDisplay').textContent = bug.homeFouls ?? 0;

    // Possession
    document.querySelectorAll('.poss-btn').forEach(b => b.classList.remove('active'));
    if (bug.possession === 'away') document.getElementById('possAway').classList.add('active');
    else if (bug.possession === 'home') document.getElementById('possHome').classList.add('active');
    else document.getElementById('possNone').classList.add('active');

    // Bonus chips
    document.querySelectorAll('.bonus-chip').forEach(chip => {
      const team = chip.dataset.team;
      const val = chip.dataset.val;
      const currentVal = team === 'away' ? (bug.awayBonus || '') : (bug.homeBonus || '');
      chip.classList.toggle('active', val === currentVal);
    });
  }

  function setIfNotFocused(id, value) {
    const el = document.getElementById(id);
    if (document.activeElement !== el && value !== undefined) {
      el.value = value ?? '';
    }
  }

  // ─── Score ───
  function adjustScore(side, delta) {
    NSMTClient.send({ type: 'increment', key: side + 'Score', delta });
  }

  // ─── Clock ───
  function toggleClock() {
    NSMTClient.patchBug({ clockRunning: !clockRunning });
  }

  function setClock(val) {
    NSMTClient.patchBug({ clock: val, clockRunning: false });
  }

  // ─── Possession ───
  function setPossession(val) {
    NSMTClient.patchBug({ possession: val });
  }

  // ─── Fouls ───
  function adjustFouls(side, delta) {
    const key = side + 'Fouls';
    const current = (state.bug || {})[key] || 0;
    NSMTClient.patchBug({ [key]: Math.max(0, current + delta) });
  }

  // ─── Bonus ───
  function setBonus(side, val) {
    NSMTClient.patchBug({ [side + 'Bonus']: val });
  }

  // ─── Timeouts ───
  function adjustTOs(side, delta) {
    const key = side + 'TOs';
    const current = (state.bug || {})[key] ?? 5;
    NSMTClient.patchBug({ [key]: Math.max(0, Math.min(5, current + delta)) });
  }

  function resetTOs(side) {
    NSMTClient.patchBug({ [side + 'TOs']: 5 });
  }

  // ─── Visibility ───
  function toggleVisibility(show) {
    NSMTClient.patchBug({ visible: show });
  }

  // ─── Input change handlers (debounced) ───
  let inputTimers = {};
  function debouncedPatch(field, key) {
    const el = document.getElementById(field);
    el.addEventListener('input', () => {
      clearTimeout(inputTimers[field]);
      inputTimers[field] = setTimeout(() => {
        NSMTClient.patchBug({ [key]: el.value });
      }, 300);
    });
  }

  // Bind text fields
  debouncedPatch('eventTitle', 'eventTitle');
  debouncedPatch('awayName', 'awayName');
  debouncedPatch('homeName', 'homeName');
  debouncedPatch('awaySeed', 'awaySeed');
  debouncedPatch('homeSeed', 'homeSeed');
  debouncedPatch('shotClock', 'shotClock');

  debouncedPatch('awayRecord', 'awayRecord');
  debouncedPatch('homeRecord', 'homeRecord');
  debouncedPatch('awayLogo', 'awayLogo');
  debouncedPatch('homeLogo', 'homeLogo');

  // Custom clock — set on blur or enter
  document.getElementById('customClock').addEventListener('change', (e) => {
    if (e.target.value) {
      setClock(e.target.value);
      e.target.value = '';
    }
  });

  // Period select
  document.getElementById('quarter').addEventListener('change', (e) => {
    NSMTClient.patchBug({ quarter: e.target.value });
  });
</script>
</body>
</html>
