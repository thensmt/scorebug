<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NSMT Scorebug Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800;900&family=Anton&display=swap" rel="stylesheet">
<style>
  :root {
    --bug-scale: 0.96;
    --bug-w: 980px;
    --center-w: 130px;
    --away-bg1: #000000;
    --away-bg2: #000000;
    --away-text: #ffffff;
    --home-bg1: #000000;
    --home-bg2: #000000;
    --home-text: #ffffff;
  }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: 'Rubik', system-ui, Segoe UI, Roboto, Arial, sans-serif;
    color: #fff;
  }
  .stage { position: relative; width: 100%; height: 100%; }
  .bugWrap {
    position: absolute; left: 50%; bottom: 32px;
    display: inline-flex; flex-direction: column; align-items: stretch;
    width: var(--bug-w);
    transform: translateX(-50%) scale(var(--bug-scale));
    transform-origin: center center;
  }
  .eventBar {
    margin: 0 auto 4px; width: 100%; height: 24px;
    display: none; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #1f2226, #0c0f12);
    border: 1px solid #000; border-radius: 6px;
    text-transform: uppercase; font-weight: 800; letter-spacing: 1.2px;
    font-size: 18px; color: #e6e6e6;
  }
  .bug {
    display: flex; align-items: stretch;
    width: 100%; height: 88px; border-radius: 6px; overflow: hidden;
    box-shadow: 0 10px 24px rgba(0,0,0,.45);
  }
  .teamPanel {
    flex: 1; display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; gap: 10px;
  }
  .teamPanel.away {
    background: linear-gradient(180deg, var(--away-bg1), var(--away-bg2));
    color: var(--away-text);
  }
  .teamPanel.home {
    background: linear-gradient(180deg, var(--home-bg1), var(--home-bg2));
    color: var(--home-text);
    border-left: 2px solid #0a0a0a;
  }
  .teamLogo {
    width: 72px; height: 72px; flex: 0 0 72px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.35); border-radius: 10px; padding: 6px;
  }
  .teamLogo img { width: 100%; height: 100%; object-fit: contain; }
  .teamInfo { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .teamName {
    font-weight: 900; font-size: 24px; letter-spacing: 1px;
    text-transform: uppercase; line-height: 1;
  }
  .teamScore {
    font-family: 'Anton', 'Rubik', sans-serif; font-size: 62px;
    line-height: .9; letter-spacing: 1px;
    text-shadow: 0 2px 0 rgba(0,0,0,.35);
  }
  .centerPanel {
    width: var(--center-w);
    background: linear-gradient(180deg, #1b1f24, #0d1116);
    color: #e9edf2;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    border-left: 2px solid #000; border-right: 2px solid #000;
    text-align: center; padding: 8px 6px;
  }
  .centerTop {
    font-weight: 800; text-transform: uppercase; font-size: 14px;
    color: #c7cbd1; line-height: 1;
  }
  .centerClock {
    font-family: 'Anton', 'Rubik', sans-serif; font-size: 34px;
    letter-spacing: .6px; line-height: 1;
  }
  .promoCenter {
    width: 110px; height: 28px;
    display: flex; align-items: center; justify-content: center;
  }
  .promoCenter img { max-width: 100%; max-height: 100%; object-fit: contain; }
  @keyframes scorePulse {
    0% { color: inherit; text-shadow: none; }
    30% { color: #FFD700; text-shadow: 0 0 12px #FFD700; }
    100% { color: inherit; text-shadow: none; }
  }
  .score-pulse { animation: scorePulse 0.6s ease-out; }
</style>
</head>
<body>
<div class="stage">
  <div class="bugWrap" id="bugWrap">
    <div class="eventBar" id="eventBar"><div id="eventTitle"></div></div>
    <div class="bug">
      <div class="teamPanel away">
        <div class="teamLogo"><img id="awayLogo" alt=""></div>
        <div class="teamInfo">
          <div class="teamName" id="awayName">AWAY</div>
        </div>
        <div class="teamScore" id="awayScore">0</div>
      </div>
      <div class="centerPanel">
        <div class="centerTop" id="period">1ST</div>
        <div class="centerClock" id="clock">8:00</div>
        <div class="promoCenter"><img src="/NSMTWordmarkBlue.png" alt="NSMT"></div>
      </div>
      <div class="teamPanel home">
        <div class="teamScore" id="homeScore">0</div>
        <div class="teamInfo">
          <div class="teamName" id="homeName">HOME</div>
        </div>
        <div class="teamLogo"><img id="homeLogo" alt=""></div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── Black preview in browser, transparent in OBS ──
  if (!navigator.userAgent.match(/OBS/i)) {
    document.body.style.background = '#000';
  }

  // ── WebSocket ──
  const WS_URL = location.hostname === 'localhost'
    ? 'ws://localhost:8765'
    : 'ws://' + location.hostname + ':8765';

  let ws, state = null;
  let prevAway = null, prevHome = null;
  let clockMs = 0, running = false, timer = null;
  let startPerf = 0, startMs = 0;

  function parseClock(str) {
    const [m, s] = String(str || '0:00').split(':').map(x => parseInt(x, 10) || 0);
    return (m * 60 + s) * 1000;
  }

  function fmtClock(ms) {
    ms = Math.max(0, ms | 0);
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function setRunning(run) {
    if (run === running) return;
    if (running) {
      const elapsed = performance.now() - startPerf;
      clockMs = Math.max(0, startMs - elapsed);
    }
    running = run;
    if (timer) { clearInterval(timer); timer = null; }
    if (running) {
      startPerf = performance.now();
      startMs = clockMs;
      timer = setInterval(function() {
        const elapsed = performance.now() - startPerf;
        clockMs = Math.max(0, startMs - elapsed);
        document.getElementById('clock').textContent = fmtClock(clockMs);
        if (clockMs <= 0) setRunning(false);
      }, 100);
    }
  }

  function hexToRgb(hex) {
    let v = String(hex || '').replace('#', '');
    if (v.length === 3) v = v.split('').map(c => c + c).join('');
    if (v.length !== 6) return null;
    const n = parseInt(v, 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
  }

  function shade(hex, pct) {
    const rgb = hexToRgb(hex);
    if (!rgb) return hex;
    const t = pct < 0 ? 0 : 255;
    const p = Math.abs(pct);
    const ch = c => Math.round((t - c) * p + c).toString(16).padStart(2, '0');
    return '#' + ch(rgb.r) + ch(rgb.g) + ch(rgb.b);
  }

  function resolveUrl(url) {
    const v = String(url || '').trim();
    if (!v) return '';
    if (/^[a-z][a-z0-9+.-]*:/i.test(v)) return v;
    if (v.startsWith('/')) return v;
    return '/' + v;
  }

  function pulse(el) {
    el.classList.remove('score-pulse');
    void el.offsetWidth;
    el.classList.add('score-pulse');
    setTimeout(() => el.classList.remove('score-pulse'), 700);
  }

  let lastClockText = null;

  function apply(s) {
    // Team names
    document.getElementById('awayName').textContent = s.awayTeam || 'AWAY';
    document.getElementById('homeName').textContent = s.homeTeam || 'HOME';

    // Scores with pulse
    const as = document.getElementById('awayScore');
    const hs = document.getElementById('homeScore');
    if (prevAway !== null && s.awayScore !== prevAway) pulse(as);
    if (prevHome !== null && s.homeScore !== prevHome) pulse(hs);
    prevAway = s.awayScore;
    prevHome = s.homeScore;
    as.textContent = s.awayScore;
    hs.textContent = s.homeScore;

    // Logos
    const al = document.getElementById('awayLogo');
    const hl = document.getElementById('homeLogo');
    if (s.awayLogo) al.src = resolveUrl(s.awayLogo);
    if (s.homeLogo) hl.src = resolveUrl(s.homeLogo);

    // Team colors
    const root = document.documentElement;
    if (s.awayPrimary) {
      root.style.setProperty('--away-bg1', s.awayPrimary);
      root.style.setProperty('--away-bg2', shade(s.awayPrimary, -0.22));
    }
    if (s.homePrimary) {
      root.style.setProperty('--home-bg1', s.homePrimary);
      root.style.setProperty('--home-bg2', shade(s.homePrimary, -0.22));
    }

    // Period
    document.getElementById('period').textContent = s.period || '1ST';

    // Event title
    const bar = document.getElementById('eventBar');
    const title = document.getElementById('eventTitle');
    if (s.eventTitle) {
      title.textContent = s.eventTitle;
      bar.style.display = 'flex';
    } else {
      bar.style.display = 'none';
    }

    // Clock
    const willRun = !!s.clockRunning;
    if (lastClockText !== s.clock || (!running && willRun)) {
      lastClockText = s.clock;
      clockMs = parseClock(s.clock);
      document.getElementById('clock').textContent = fmtClock(clockMs);
    }
    setRunning(willRun);
  }

  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onopen = () => ws.send(JSON.stringify({ type: 'get_state' }));
    ws.onmessage = (evt) => {
      const msg = JSON.parse(evt.data);
      if (msg.type === 'snapshot' || msg.type === 'state') {
        state = msg.data;
        apply(state);
      }
    };
    ws.onclose = () => setTimeout(connect, 2000);
  }

  function updateScale() {
    const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    document.documentElement.style.setProperty('--bug-scale', (0.96 * s).toFixed(4));
  }

  window.addEventListener('resize', updateScale);
  document.addEventListener('DOMContentLoaded', () => {
    updateScale();
    connect();
  });
})();
</script>
</body>
</html>
